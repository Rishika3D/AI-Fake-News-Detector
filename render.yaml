services:
  # ── Backend (Express + job worker) ──────────────────────────────────────────
  - type: web
    name: verinews-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000          # Render assigns the public port; internal is 10000
      - key: DATABASE_URL
        fromDatabase:
          name: verinews-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: HF_ACCESS_TOKEN
        sync: false           # you paste this in the Render dashboard
      - key: FRONTEND_URL
        sync: false           # paste your Vercel/Netlify URL after deploying frontend

  # ── Frontend (Vite → static site) ───────────────────────────────────────────
  - type: web
    name: verinews-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false           # paste your Render backend URL: https://verinews-backend.onrender.com/api/analyze

# ── PostgreSQL database ──────────────────────────────────────────────────────
databases:
  - name: verinews-db
    databaseName: verinews
    user: verinews_user
    plan: free
